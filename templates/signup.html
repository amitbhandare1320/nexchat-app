<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexChat — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #7c3aed; --accent2: #06d6a0; --text: #e2e2f0; --muted: #6b6b8a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.4; z-index: 0; }
    .card { position: relative; z-index: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 24px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .flash-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    .avatar-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .avatar-option input[type="radio"] { display: none; }
    .avatar-option label { width: 44px; height: 44px; background: var(--bg); border: 2px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
    .avatar-option input:checked + label { border-color: var(--accent); transform: scale(1.1); }
    .avatar-option label:hover { border-color: var(--accent2); }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #9f1fff); border: none; border-radius: 8px; color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 8px; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
    .footer a { color: var(--accent2); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <span class="logo-text">NexChat</span>
    </div>
    <h1>Create account</h1>
    <p class="subtitle">Join NexChat and start chatting</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-error">⚠️ {{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="choose_username" required autofocus />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <div class="field">
        <label>Pick your avatar</label>
        <div class="avatar-grid">
          {% for av in avatars %}
          <div class="avatar-option">
            <input type="radio" name="avatar" id="av{{ loop.index }}" value="{{ av }}" {% if loop.first %}checked{% endif %} />
            <label for="av{{ loop.index }}">{{ av }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <button class="btn" type="submit">Create Account →</button>
    </form>
    <p class="footer">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</body>
</html>
